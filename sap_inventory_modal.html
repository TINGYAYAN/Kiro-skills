<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP库存查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .modal {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 500px;
            padding: 24px;
        }
        
        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        
        .form-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .form-select:hover {
            border-color: #40a9ff;
        }
        
        .form-select:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }
        
        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #1890ff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #40a9ff;
        }
        
        .btn-primary:active {
            background: #096dd9;
        }
        
        .btn-default {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #d9d9d9;
        }
        
        .btn-default:hover {
            border-color: #40a9ff;
            color: #40a9ff;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1890ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="modal">
        <div class="modal-header">SAP库存查询</div>
        
        <div id="formContent">
            <div class="form-group">
                <label class="form-label">批次</label>
                <select id="batch" class="form-select">
                    <option value="">请选择</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">物料</label>
                <select id="material" class="form-select">
                    <option value="">请选择</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">库存地点</label>
                <select id="location" class="form-select">
                    <option value="">请选择</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">序列号</label>
                <select id="serialNumber" class="form-select">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <span class="spinner"></span>加载中...
        </div>
        
        <div class="modal-footer">
            <button class="btn btn-default" id="cancelBtn">取消</button>
            <button class="btn btn-primary" id="queryBtn">查询</button>
        </div>
    </div>

    <script>
        // 调用自定义控制器获取查询条件数据
        async function loadQueryOptions() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('formContent').style.display = 'none';
                
                // 调用自定义控制器 CstmCtrl_Rp4E5__c
                const response = await window.parent.postMessage({
                    action: 'callController',
                    controller: 'CstmCtrl_Rp4E5__c',
                    params: {}
                }, '*');
                
                // 监听返回数据
                window.addEventListener('message', function(event) {
                    if (event.data.action === 'controllerResult') {
                        const data = event.data.result;
                        populateSelects(data);
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('formContent').style.display = 'block';
                    }
                });
            } catch (error) {
                console.error('加载查询条件失败:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('formContent').style.display = 'block';
            }
        }
        
        // 填充下拉选项
        function populateSelects(data) {
            const selects = {
                'batch': data.batch || [],
                'material': data.material || [],
                'location': data.location || [],
                'serialNumber': data.serial_number || []
            };
            
            for (const [id, options] of Object.entries(selects)) {
                const select = document.getElementById(id);
                options.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option;
                    opt.textContent = option;
                    select.appendChild(opt);
                });
            }
        }
        
        // 查询按钮
        document.getElementById('queryBtn').addEventListener('click', function() {
            const queryParams = {
                batch: document.getElementById('batch').value,
                material: document.getElementById('material').value,
                location: document.getElementById('location').value,
                serialNumber: document.getElementById('serialNumber').value
            };
            
            // 返回查询条件给父窗口
            window.parent.postMessage({
                action: 'querySubmit',
                params: queryParams
            }, '*');
            
            // 关闭弹窗
            closeModal();
        });
        
        // 取消按钮
        document.getElementById('cancelBtn').addEventListener('click', function() {
            closeModal();
        });
        
        // 关闭弹窗
        function closeModal() {
            window.parent.postMessage({
                action: 'closeModal'
            }, '*');
        }
        
        // 页面加载时获取查询条件
        window.addEventListener('load', loadQueryOptions);
    </script>
</body>
</html>
